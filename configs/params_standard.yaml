# Algorithm-specific internal parameters (paper-compliant defaults)
# ACT_Ghani_V2-6.pdf
fitness:
  fitm: false
  sc_method: '0'      # fit(A) = -score(A) - lambda*dist(A)  [Section 3.2]
  lmbda: 0.1          # lambda weight for distance term       [Section 3.2]
infill:
  inf: '1a'           # elite top-tau individuals -> epsilon-constraint [Algorithm 3]
  tau: 1              # size of elite set E                   [Algorithm 3]
  exact_method: 'epsilon'  # epsilon-constraint NLP solver   [Algorithm 3]
env_selection:
  temp_pop: '0'       # standard merge P U P'
  env_sel_method: 'crowd'  # Rank & Crowding tie-breaker     [Algorithm 4 / Section 3.3]
  sel_pop: '2'        # iterative recalculation when |fit=0| < N
